<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CICTify Chatbot</title>
  <link rel="icon" type="image/png" href="/images/CICTify_ChatLogo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Floating Widget Button -->
  <div id="chat-icon" onclick="toggleChat()">
    <img src="images/floatingCICTify.png" alt="Chatbot" id="chat-widget">
    <span class="chat-title">CICTify</span>
  </div>

  <!-- Chatbox -->
  <div id="chatbox">
    <div id="chat-header">
      <div class="header-left">
        <img src="images/chatBubble.png" alt="Chat Icon" class="header-icon">
        <span id="header-title">CICTify</span>
      </div>
      <div id="header-actions">
        <button id="route-feature-btn" title="Route Planner">🧭</button>
        <button id="expand-btn">⛶</button>
        <button id="close-btn" onclick="toggleChat()">✖</button>
      </div>
    </div>
    <div id="chat-log"></div>
    <div id="chat-input-area">
      <input type="text" id="user-input" placeholder="Message CICTify">

      <button id="mic-btn" title="Speak">
        <img src="images/micIcon.png" alt="Voice">
      </button>

      <button id="send-btn" title="Send">
        <img src="images/sendIcon.png" alt="Send">
      </button>
    </div>

    <div id="route-panel" class="hidden">
      <div id="route-panel-title">
        <span>Route Planner</span>
        <button id="route-map-toggle" title="Show or hide map">Show map</button>
      </div>
      <div class="route-controls">
        <select id="route-from">
          <option value="">From...</option>
        </select>
        <select id="route-to">
          <option value="">To...</option>
        </select>
        <select id="route-algorithm">
          <option value="astar">A*</option>
          <option value="dijkstra">Dijkstra</option>
        </select>
        <button id="route-btn" title="Compute Route">Show Route</button>
      </div>
      <div id="route-summary"></div>
      <div id="route-canvas-wrap" class="hidden">
        <img id="route-plan-bg" class="hidden" alt="Route plan background" />
        <svg id="route-svg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>
  </div>

  <script src="script.js?v=20260427b"></script>
</body>
</html>
